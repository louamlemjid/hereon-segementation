<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upload Image</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }
    img {
      max-width: 300px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h2>Upload Image</h2>

  <input type="text" id="userId" placeholder="Enter userId" />
  <br><br>

  <input type="file" id="imageInput" accept="image/*" />
  <br><br>

  <button onclick="uploadImage()">Submit</button>

  <h3>Result:</h3>
  <img id="resultImage" />

  <script>
    async function uploadImage() {
      const userId = document.getElementById("userId").value;
      const fileInput = document.getElementById("imageInput");
      const file = fileInput.files[0];

      if (!userId || !file) {
        alert("Please provide userId and image");
        return;
      }

      const reader = new FileReader();

      reader.onload = async function () {
        const base64Image = reader.result.split(",")[1]; // remove data:image/... prefix

        try {
          const response = await fetch("http://localhost:8000/image/uploadImage", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              userId: userId,
              image: base64Image
            })
          });

          const data = await response.json();
          console.log("Upload response:", data);

          // Connect to SSE
          connectSSE(`http://localhost:8000${data.sse}`);

        } catch (err) {
          console.error("Upload error:", err);
        }
      };

      reader.readAsDataURL(file);
    }

    function connectSSE(url) {
      console.log("Connecting to SSE:", url);

      const eventSource = new EventSource(url);

      eventSource.onmessage = function (event) {
        const data = JSON.parse(event.data);
        console.log("SSE data:", data);

        if (data.image) {
          document.getElementById("resultImage").src = "data:image/png;base64," + data.image;
        } else if (data.error) {
          alert("Error: " + data.error);
        }

        eventSource.close(); // close after receiving result
      };

      eventSource.onerror = function (err) {
        console.error("SSE error:", err);
        eventSource.close();
      };
    }
  </script>

</body>
</html>
