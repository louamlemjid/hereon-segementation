name: Frontend Build (React Router SSR)

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/hereon-om/**'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/hereon-om

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/hereon-om/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build full-stack React Router app
        run: npm run build

      - name: Verify build output
        run: |
          echo "Checking build output..."
          ls -R build || echo "No build folder found"

      - name: Upload client build
        uses: actions/upload-artifact@v4
        with:
          name: react-client
          path: frontend/hereon-om/build/client

      - name: Upload server build
        uses: actions/upload-artifact@v4
        with:
          name: react-server
          path: frontend/hereon-om/build/server